name: CI/CD

on:
  push:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  intro:
    name: Pipeline
    runs-on: self-hosted
    steps:
      - name: Welcome message
        run: | 
          echo "Starting CI/CD pipeline for timeserver project! 🚀"
          env

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Type check ───────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── 2. Unit tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci

      - name: Run tests with coverage
        run: npm test

  # ── 3. Docker build + Trivy image scan ──────────────────────────────────────
  build-and-scan:
    name: Docker Build & Image Scan
    runs-on: self-hosted
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t timeserver:${{ github.sha }} .

      - name: Install Trivy (if not present)
        run: |
          if ! command -v trivy &> /dev/null; then
            brew install aquasecurity/trivy/trivy
          fi
          

      - name: Scan image with Trivy
        run: trivy image --exit-code 1 --ignore-unfixed --severity CRITICAL,HIGH timeserver:${{ github.sha }}

  # ── 4. Helm lint ────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint ./helm/timeserver

  # ── 5. Smoke tests ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: self-hosted
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Start server in background
        run: npm start &

      - name: Wait for server to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8888/health/live && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 1
          done

      - name: Run smoke tests
        run: npm run smoke-test

      - name: Stop background server
        if: ${{ always() }}
        run: lsof -ti:8888 | xargs kill -9 2>/dev/null || true

  # ── 6. Deploy to minikube ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: [build-and-scan, helm-lint, smoke-test]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - run: npm ci

      - name: Verify minikube is running
        run: minikube status

      - name: Set image tag
        id: tag
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t timeserver:${{ steps.tag.outputs.short }} .

      - name: Load image into minikube
        run: minikube image load timeserver:${{ steps.tag.outputs.short }}

      - name: Helm upgrade
        run: |
          helm upgrade timeserver ./helm/timeserver \
            --set image.tag=${{ steps.tag.outputs.short }} \
            --install \
            --wait \
            --timeout 120s

      - name: Start port-forward
        run: |
          lsof -ti:8888 | xargs kill -9 2>/dev/null || true
          kubectl port-forward svc/timeserver-timeserver 8888:8888 &
          echo "PF_PID=$!" >> $GITHUB_ENV

      - name: Wait for service to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8888/health/live && echo "Service ready" && break
            echo "Waiting... ($i)"
            sleep 1
          done

      - name: Run smoke tests against minikube
        run: npm run smoke-test

      - name: Stop port-forward
        if: ${{ always() }}
        run: kill $PF_PID 2>/dev/null || true
