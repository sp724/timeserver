replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Requires a CNI that enforces NetworkPolicy (e.g. Calico, Cilium).
# minikube's default CNI does not enforce NetworkPolicy.
networkPolicy:
  enabled: false

# Caps total CPU, memory, and pod count for the entire namespace.
# Note: quota applies to all workloads in the namespace, not just this release.
resourceQuota:
  enabled: false
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
  maxPods: "10"

config:
  port: "8888"
  nodeEnv: "production"

# Never put real secret values here — values.yaml is committed to source control.
# Instead, pass secrets at deploy time via --set or a gitignored values file:
#   helm upgrade timeserver ./helm/timeserver -f values.secret.yaml
# See values.secret.yaml.example for the expected structure.
secret:
  create: false
  data: {}
  # data:
  #   OTEL_EXPORTER_OTLP_ENDPOINT: ""

image:
  repository: timeserver
  tag: latest
  pullPolicy: Never  # Critical: local minikube image, no registry pull

service:
  type: NodePort
  port: 8888

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health/live
    port: 8888
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8888
  initialDelaySeconds: 3
  periodSeconds: 5
